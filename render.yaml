services:
  - type: web
    name: n8n-automation-server
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_CONNECTION_STRING
        sync: false # Tells Render NOT to overwrite this from GitHub
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: PORT
        value: 10000
