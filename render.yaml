services:
  - type: web
    name: n8n-automation-server
    runtime: docker
    repo: https://github.com # Pulls official code directly
    plan: free
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_CONNECTION_STRING
        value: postgres://user:pass@host:port/db # We will overwrite this in the dashboard
      - key: N8N_ENCRYPTION_KEY
        generateValue: true # Generates a secure random key automatically
      - key: N8N_PORT
        value: 10000
